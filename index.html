<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJC Air Maintenance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<<body class="bg-slate-900 p-4 md:p-8 text-slate-100">
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
        <div>
            <h1 class="text-2xl md:text-3xl font-bold text-white uppercase tracking-tight">
                BJC DHL LOGISTICS SOLUTION LIMITED
            </h1>
            <div class="flex items-center gap-2 mt-2">
                <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                <p class="text-slate-400 font-medium uppercase text-xs tracking-widest">
                    Real-time Maintenance Intelligence
                </p>
            </div>
        </div>

        <div class="flex flex-wrap gap-3">
            <a href="entry.html" class="flex items-center gap-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-3 px-6 rounded-xl shadow-lg transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                บันทึกงานซ่อมใหม่
            </a>

            <a href="admin.html" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-6 rounded-xl border border-slate-700 shadow-lg transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                </svg>
                จัดการสถานะงาน
            </a>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl relative overflow-hidden group">
            <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <h3 class="text-slate-400 text-sm font-medium uppercase">งานซ่อมเดือนนี้</h3>
            <p id="monthTotal" class="text-5xl font-bold text-amber-500 mt-3">0</p>
            <p class="text-xs text-slate-500 mt-2">อัปเดตล่าสุด: เมื่อสักครู่</p>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl relative overflow-hidden group">
            <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h3 class="text-slate-400 text-sm font-medium uppercase">สถานะรอดำเนินการ</h3>
            <p id="pendingTotal" class="text-5xl font-bold text-red-500 mt-3">0</p>
            <p class="text-xs text-slate-500 mt-2">ต้องเร่งดำเนินการแก้ไข</p>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl relative overflow-hidden group">
            <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h3 class="text-slate-400 text-sm font-medium uppercase">งบประมาณสะสม (YTD)</h3>
            <p id="totalCost" class="text-5xl font-bold text-emerald-500 mt-3">0K</p>
            <p class="text-xs text-slate-500 mt-2">รวมค่าใช้จ่ายทุก Site</p>
        </div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
    <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl" style="height: 550px;">
        <h3 class="text-white text-xl font-bold mb-6 flex items-center gap-2">
            <span class="w-2 h-6 bg-amber-500 rounded-full"></span>
            สถิติงานซ่อมแยกตาม Site
        </h3>
        <div class="relative h-[400px]">
            <canvas id="siteChart"></canvas>
        </div>
    </div>

    <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl" style="height: 550px;">
        <h3 class="text-white text-xl font-bold mb-6 flex items-center gap-2">
            <span class="w-2 h-6 bg-emerald-500 rounded-full"></span>
            สัดส่วนอาการเสีย (%)
        </h3>
        <div class="relative h-[400px]">
            <canvas id="issueChart"></canvas>
        </div>
    </div>
</div>

    <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxvXFopdJpFZusIl956IbMr2HLPVmxZF28RiogjO8NuXQ5fqf9wTYbeTuZjbApYniOyNg/exec'; 

    let siteChart, issueChart;
    // ลงทะเบียน Plugin สำหรับโชว์ตัวเลขค้าง
    Chart.register(ChartDataLabels);

    function loadDashboardData() {
        fetch(scriptURL + '?mode=dashboard')
            .then(res => res.json())
            .then(data => {
                document.getElementById('monthTotal').innerText = data.monthTotal;
                document.getElementById('pendingTotal').innerText = data.pendingTotal;
                document.getElementById('totalCost').innerText = (data.totalCost / 1000).toFixed(1) + 'K';

                updateSiteChart(data.siteStats);
                updateIssueChart(data.issueStats);
            })
            .catch(err => console.error("Error:", err));
    }

    function updateSiteChart(stats) {
        const ctx = document.getElementById('siteChart').getContext('2d');
        if (siteChart) siteChart.destroy();

        siteChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(stats),
                datasets: [{
                    data: Object.values(stats),
                    backgroundColor: ['#fb923c', '#60a5fa', '#fcd34d', '#4ade80', '#c084fc'],
                    borderRadius: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    datalabels: { // โชว์ตัวเลขบนแท่งกราฟ
                        anchor: 'end',
                        align: 'top',
                        color: '#ffffff',
                        font: { weight: 'bold', size: 16 }
                    }
                },
                scales: {
                    y: { 
                        grid: { color: '#334155' },
                        ticks: { color: '#94a3b8', font: { size: 14 } }
                    },
                    x: { 
                        ticks: { color: '#ffffff', font: { size: 16, weight: 'bold' } }
                    }
                }
            }
        });
    }

    function updateIssueChart(stats) {
        const ctx = document.getElementById('issueChart').getContext('2d');
        if (issueChart) issueChart.destroy();

        const rawData = Object.values(stats);
        const total = rawData.reduce((a, b) => a + b, 0);

        issueChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(stats),
                datasets: [{
                    data: rawData,
                    backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#94a3b8'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: 20 },
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#94a3b8', font: { size: 14 }, padding: 20 }
                    },
                    datalabels: { // โชว์ % ค้างไว้บนชิ้นเค้ก
                        color: '#fff',
                        font: { weight: 'bold', size: 14 },
                        formatter: (value) => {
                            return ((value / total) * 100).toFixed(1) + '%';
                        }
                    },
                    tooltip: { enabled: true }
                },
                cutout: '70%'
            },
            plugins: [{
                id: 'centerText',
                beforeDraw: function(chart) {
                    const width = chart.width, height = chart.height, ctx = chart.ctx;
                    ctx.restore();
                    
                    // วาด "100%"
                    ctx.font = "bold 3rem Prompt";
                    ctx.fillStyle = "#ffffff";
                    ctx.textBaseline = "middle";
                    const text = "100%", textX = Math.round((width - ctx.measureText(text).width) / 2), textY = height / 2 - 20;
                    ctx.fillText(text, textX, textY);

                    // วาด "สรุปงานซ่อม"
                    ctx.font = "500 1.2rem Prompt";
                    ctx.fillStyle = "#94a3b8";
                    const text2 = "สรุปภาพรวม", textX2 = Math.round((width - ctx.measureText(text2).width) / 2), textY2 = height / 2 + 30;
                    ctx.fillText(text2, textX2, textY2);
                    ctx.save();
                }
            }]
        });
    }

    window.onload = loadDashboardData;
</script>
</body>
</html>
