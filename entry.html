<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Maintenance Log - BJC DHL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-900 p-4 md:p-8 text-slate-100 flex justify-center">

    <div class="w-full max-w-lg bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
        <h2 class="text-2xl font-bold text-amber-500 mb-2">บันทึกงานซ่อมบำรุง</h2>
        <p class="text-slate-400 mb-8 border-b border-slate-700 pb-4">BJC DHL LOGISTICS SOLUTION LIMITED</p>

        <form id="maintenanceForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">1. เลือก Site งาน</label>
                <select id="site" name="site" required class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all text-white">
                    <option value="">-- กรุณาเลือก Site --</option>
                    <option value="NDC">NDC</option>
                    <option value="LDC">LDC</option>
                    <option value="BDC4">BDC4</option>
                    <option value="HBL">HBL</option>
                    <option value="DG">DG</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">2. รหัสเครื่องปรับอากาศ</label>
                <select id="unitCode" name="unitCode" required class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500 text-white">
                    <option value="">-- เลือก Site ก่อน --</option>
                </select>
            </div>

            <div>
    <label class="block text-sm font-medium text-slate-400 mb-2">3. อาการที่พบ / รายการซ่อม</label>
    <select id="issue" name="issue" required class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 mb-2 focus:ring-2 focus:ring-amber-500 text-white">
        <option value="">-- กรุณาเลือกรายการ --</option>
        
        <optgroup label="งานบำรุงรักษา (PM)">
            <option value="PM ล้างย่อย (ฉีดล้างคอยล์ร้อน)">PM ล้างย่อย (ฉีดล้างคอยล์ร้อน)</option>
            <option value="PM ล้างใหญ่ (ฉีดล้างคอยล์ร้อน+คอยล์เย็น)">PM ล้างใหญ่ (ฉีดล้างคอยล์ร้อน+คอยล์เย็น)</option>
        </optgroup>

        <optgroup label="งานเปลี่ยน Capacitor">
            <option value="เปลี่ยน Cap มอเตอร์พัดลมคอยล์ร้อน">เปลี่ยน Cap มอเตอร์พัดลมคอยล์ร้อน</option>
            <option value="เปลี่ยน Cap มอเตอร์พัดลมคอยล์เย็น">เปลี่ยน Cap มอเตอร์พัดลมคอยล์เย็น</option>
            <option value="เปลี่ยน Cap คอมเพรสเซอร์">เปลี่ยน Cap คอมเพรสเซอร์</option>
        </optgroup>

        <optgroup label="งานเปลี่ยนอะไหล่หลัก">
            <option value="เปลี่ยนคอมเพรสเซอร์ ใหม่">เปลี่ยนคอมเพรสเซอร์ ใหม่</option>
            <option value="เปลี่ยน มอเตอร์พัดลมคอยล์ร้อน">เปลี่ยน มอเตอร์พัดลมคอยล์ร้อน</option>
            <option value="เปลี่ยน มอเตอร์พัดลมคอยล์เย็น">เปลี่ยน มอเตอร์พัดลมคอยล์เย็น</option>
            <option value="เปลี่ยนใบพัดลม มอเตอร์คอยล์ร้อน">เปลี่ยนใบพัดลม มอเตอร์คอยล์ร้อน</option>
            <option value="เปลี่ยนใบพัดลม มอเตอร์คอยล์เย็น">เปลี่ยนใบพัดลม มอเตอร์คอยล์เย็น</option>
            <option value="เปลี่ยน แผงคอยล์ร้อน">เปลี่ยน แผงคอยล์ร้อน</option>
        </optgroup>

        <optgroup label="งานซ่อมระบบและไฟฟ้า">
            <option value="ซ่อม รั่ว คอยล์ร้อน / ท่อน้ำยาซ่อม">ซ่อม รั่ว คอยล์ร้อน / ท่อน้ำยาซ่อม</option>
            <option value="ระบบไฟฟ้าซ่อม">ระบบไฟฟ้าซ่อม</option>
            <option value="แผงบอร์ด คอนโทรล">แผงบอร์ด คอนโทรล</option>
            <option value="ซ่อม แผงรีโมท แอร์">ซ่อม แผงรีโมท แอร์</option>
            <option value="Overhaul คอมเพรสเซอร์">Overhaul คอมเพรสเซอร์</option>
        </optgroup>

        <optgroup label="งานระบบน้ำ">
            <option value="ซ่อม แอร์น้ำหยด ที่คอยล์เย็น">ซ่อม แอร์น้ำหยด ที่คอยล์เย็น</option>
            <option value="ซ่อม ท่อน้ำทิ้ง / ท่อน้ำทิ้งตัน">ซ่อม ท่อน้ำทิ้ง / ท่อน้ำทิ้งตัน</option>
        </optgroup>

        <option value="อื่นๆ">อื่นๆ (ระบุในหมายเหตุ)</option>
    </select>
    <textarea id="issueDetail" name="issueDetail" rows="2" class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-sm mt-1" placeholder="พิมพ์รายละเอียดเพิ่มเติมตรงนี้..."></textarea>
</div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">ค่าใช้จ่าย (บาท)</label>
                    <input type="number" id="cost" name="cost" class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3">
                </div>
                <div>
    <label class="block text-sm font-medium text-slate-400 mb-2">ชื่อช่าง / ผู้บันทึก</label>
    <select id="technician" name="technician" required class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500 text-white">
        <option value="">-- กรุณาเลือกรายชื่อ --</option>
        
        <optgroup label="Internal Staff">
            <option value="ช่างมานิจ">ช่างมานิจ</option>
            <option value="ช่างศราวุฒิ">ช่างศราวุฒิ</option>
            <option value="ช่างสำเริง">ช่างสำเริง</option>
            <option value="ช่างสมชาย">ช่างสมชาย</option>
            <option value="ช่างมานิจ+ช่างศราวุฒิ,ช่างสำเริง,ช่างสมชาย">ทีมช่าง (รวม)</option>
        </optgroup>

        <optgroup label="Outsource / Supplier">
            <option value="Sup รวยทรัพย์">Sup รวยทรัพย์</option>
            <option value="Sup รีม่าเทค">Sup รีม่าเทค</option>
            <option value="Sup มินเด็น กรุ๊ป">Sup มินเด็น กรุ๊ป</option>
            <option value="Sup บุญศิริ">Sup บุญศิริ</option>
        </optgroup>
    </select>
</div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95">
                ยืนยันการบันทึกข้อมูล
            </button>
            
            <a href="index.html" class="block text-center text-slate-500 text-sm hover:text-white">ยกเลิกและกลับหน้าหลัก</a>
        </form>
    </div>

    <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxvXFopdJpFZusIl956IbMr2HLPVmxZF28RiogjO8NuXQ5fqf9wTYbeTuZjbApYniOyNg/exec'; 

    let airCodes = {}; 

    // 1. ปรับการดึงข้อมูลให้รองรับ Google Redirect
    window.onload = function() {
        console.log("กำลังเชื่อมต่อฐานข้อมูล...");
        // ใช้โหมด no-cors ไม่ได้กับ JSON ดังนั้นเราจะใช้ fetch แบบปกติแต่ดักจับ error ให้ละเอียดขึ้น
        fetch(scriptURL)
            .then(res => {
                if (!res.ok) throw new Error('Network response was not ok');
                return res.json();
            })
            .then(data => {
                airCodes = data; 
                console.log("โหลดข้อมูลสำเร็จ:", airCodes);
                // แสดงสถานะที่ปุ่มชั่วคราวเพื่อให้รู้ว่าโหลดเสร็จแล้ว
                document.getElementById('submitBtn').innerHTML = 'ยืนยันการบันทึกข้อมูล (ฐานข้อมูลพร้อม)';
            })
            .catch(err => {
                console.error("โหลดข้อมูลไม่สำเร็จ:", err);
                // ถ้าโหลดไม่เข้าจริงๆ ให้ลองแจ้งเตือน
                alert("ไม่สามารถดึงรายชื่อแอร์ได้ โปรดตรวจสอบว่าคุณเลือก 'Anyone' ในตอน Deploy หรือยัง");
            });
    };

    // 2. ระบบเปลี่ยน Code ตาม Site (ปรับให้รองรับกรณีข้อมูลยังโหลดไม่เสร็จ)
    document.getElementById('site').addEventListener('change', function() {
        const unitSelect = document.getElementById('unitCode');
        const selectedSite = this.value;
        
        if (Object.keys(airCodes).length === 0) {
            unitSelect.innerHTML = '<option value="">-- กำลังรอข้อมูลจาก Server... --</option>';
            return;
        }

        unitSelect.innerHTML = '<option value="">-- เลือกรหัสเครื่อง --</option>';
        
        if(selectedSite && airCodes[selectedSite]) {
            airCodes[selectedSite].forEach(code => {
                const opt = document.createElement('option');
                opt.value = code;
                opt.innerHTML = code;
                unitSelect.appendChild(opt);
            });
        } else {
            unitSelect.innerHTML = '<option value="">-- ไม่พบข้อมูลใน Site นี้ --</option>';
        }
    });

    // 3. ระบบส่งข้อมูล (คงเดิม)
    const form = document.getElementById('maintenanceForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = 'กำลังบันทึก...';
        btn.disabled = true;

        const formData = new FormData(form);
        const obj = {};
        formData.forEach((value, key) => obj[key] = value);

        // สำหรับ POST เราจะส่งแบบใช้ mode: 'no-cors' เพื่อเลี่ยงปัญหาสิทธิการเข้าถึงในบาง Browser
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // เพิ่มโหมดนี้เพื่อความชัวร์ในการส่งข้อมูล
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(obj)
        })
        .then(res => {
            alert('บันทึกข้อมูลสำเร็จ! (ข้อมูลกำลังเดินทางไปที่ Sheets)');
            form.reset();
            window.location.href = 'index.html';
        })
        .catch(error => {
            alert('เกิดข้อผิดพลาด: ' + error.message);
            btn.innerHTML = 'ยืนยันการบันทึกข้อมูล';
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
