<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Admin - BJC DHL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-900 p-4 md:p-8 text-slate-100">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-amber-500">จัดการสถานะงานซ่อม</h1>
                <p class="text-slate-400">BJC DHL LOGISTICS SOLUTION LIMITED</p>
            </div>
            <a href="index.html" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm">กลับหน้าหลัก</a>
        </div>

        <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-700 text-slate-300 text-sm uppercase">
                        <tr>
                            <th class="px-6 py-4">วัน-เวลา</th>
                            <th class="px-6 py-4">Site / เครื่อง</th>
                            <th class="px-6 py-4">อาการ / รายการซ่อม</th>
                            <th class="px-6 py-4">ช่าง</th>
                            <th class="px-6 py-4">สถานะ</th>
                            <th class="px-6 py-4">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody" class="divide-y divide-slate-700">
                        <tr><td colspan="6" class="px-6 py-10 text-center text-slate-500">กำลังโหลดข้อมูลงานซ่อม...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxvXFopdJpFZusIl956IbMr2HLPVmxZF28RiogjO8NuXQ5fqf9wTYbeTuZjbApYniOyNg/exec';

        // ดึงข้อมูลมาโชว์ในตาราง
        function loadLogs() {
            // หมายเหตุ: ในการใช้งานจริงต้องแก้ doGet ให้รองรับการส่งค่า mode=list 
            // แต่เพื่อความง่าย เราจะใช้ fetch แบบเดิมแล้วกรองข้อมูลเอาครับ
            fetch(scriptURL + '?mode=list') 
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('logTableBody');
                    tbody.innerHTML = '';
                    
                    // สมมติว่าโครงสร้างข้อมูลที่ส่งกลับมาเป็น Array ของงานซ่อม
                    // (ต้องไปปรับ doGet ใน Apps Script ให้รองรับการส่ง logs ออกมาด้วยครับ)
                    // ถ้ายังไม่แก้ doGet ให้ใช้ข้อมูลจำลองก่อนเพื่อทดสอบ UI ครับ
                    renderTable(data.logs || []); 
                });
        }

        function renderTable(logs) {
            const tbody = document.getElementById('logTableBody');
            logs.reverse().forEach(log => { // เอาอันใหม่ขึ้นก่อน
                const date = new Date(log.timestamp).toLocaleString('th-TH');
                const statusClass = log.status === 'เสร็จสิ้น' ? 'text-green-400' : 'text-amber-400';
                
                const row = `
                    <tr class="hover:bg-slate-750 transition-colors">
                        <td class="px-6 py-4 text-sm text-slate-400">${date}</td>
                        <td class="px-6 py-4">
                            <div class="font-bold text-white">${log.site}</div>
                            <div class="text-xs text-slate-500">${log.unit}</div>
                        </td>
                        <td class="px-6 py-4 text-sm text-slate-300">${log.issue}</td>
                        <td class="px-6 py-4 text-sm text-slate-400">${log.tech}</td>
                        <td class="px-6 py-4 text-sm font-bold ${statusClass}">${log.status}</td>
                        <td class="px-6 py-4">
                            <select onchange="updateStatus('${log.timestamp}', this.value)" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs">
                                <option value="">เปลี่ยนสถานะ</option>
                                <option value="รอดำเนินการ">รอดำเนินการ</option>
                                <option value="รออะไหล่">รออะไหล่</option>
                                <option value="เสร็จสิ้น">เสร็จสิ้น</option>
                            </select>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function loadLogs() {
    fetch(scriptURL + '?mode=list') // ต้องมี ?mode=list เพื่อบอก Apps Script ให้ส่งรายการงานซ่อมมา
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = '';
            renderTable(data); // data ที่ได้จะเป็น Array ของรายการงานซ่อมแล้วครับ
        })
        .catch(err => {
            console.error("Error:", err);
            document.getElementById('logTableBody').innerHTML = '<tr><td colspan="6" class="text-center text-red-400 py-10">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
        });
}

        window.onload = loadLogs;
    </script>
</body>
</html>
