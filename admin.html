<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Admin - BJC DHL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-900 p-4 md:p-8 text-slate-100">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-amber-500">จัดการสถานะงานซ่อม</h1>
                <p class="text-slate-400">BJC DHL LOGISTICS SOLUTION LIMITED</p>
            </div>
            <a href="index.html" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm">กลับหน้าหลัก</a>
        </div>

        <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-700 text-slate-300 text-sm uppercase">
                        <tr>
                            <th class="px-6 py-4">วัน-เวลา</th>
                            <th class="px-6 py-4">Site / เครื่อง</th>
                            <th class="px-6 py-4">อาการ / รายการซ่อม</th>
                            <th class="px-6 py-4">ช่าง</th>
                            <th class="px-6 py-4">สถานะ</th>
                            <th class="px-6 py-4">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody" class="divide-y divide-slate-700">
                        <tr><td colspan="6" class="px-6 py-10 text-center text-slate-500">กำลังโหลดข้อมูลงานซ่อม...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
    // 1. ใส่ URL เว็บแอปของคุณนิกกี้ที่นี่ (ตัวเดียวกับหน้า index และ entry)
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxvXFopdJpFZusIl956IbMr2HLPVmxZF28RiogjO8NuXQ5fqf9wTYbeTuZjbApYniOyNg/exec';

    // ฟังก์ชันดึงข้อมูลมาแสดงในตาราง
    function loadLogs() {
        fetch(scriptURL + '?mode=list')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('logTableBody');
                tbody.innerHTML = '';
                renderTable(data);
            })
            .catch(err => {
                console.error("Load Error:", err);
                document.getElementById('logTableBody').innerHTML = '<tr><td colspan="6" class="text-center text-red-400 py-10">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
            });
    }

    // ฟังก์ชันสร้างแถวในตาราง
    function renderTable(logs) {
        const tbody = document.getElementById('logTableBody');
        // เรียงลำดับจากใหม่ไปเก่า (Reverse)
        logs.reverse().forEach(log => {
            const date = new Date(log.timestamp).toLocaleString('th-TH');
            
            // กำหนดสีตามสถานะ
            let statusColor = 'text-amber-400'; // รอดำเนินการ
            if (log.status === 'เสร็จสิ้น') statusColor = 'text-green-400';
            if (log.status === 'รออะไหล่') statusColor = 'text-red-400';

            const row = `
                <tr class="hover:bg-slate-750 transition-colors border-b border-slate-700">
                    <td class="px-6 py-4 text-xs text-slate-400">${date}</td>
                    <td class="px-6 py-4">
                        <div class="font-bold text-white">${log.site}</div>
                        <div class="text-xs text-slate-500">${log.unit}</div>
                    </td>
                    <td class="px-6 py-4 text-sm text-slate-300">${log.issue}</td>
                    <td class="px-6 py-4 text-sm text-slate-400">${log.tech}</td>
                    <td class="px-6 py-4 text-sm font-bold ${statusColor}">${log.status}</td>
                    <td class="px-6 py-4">
                        <select onchange="updateStatus('${log.timestamp}', this.value)" class="bg-slate-900 border border-slate-600 rounded-lg px-2 py-1 text-xs text-white focus:ring-2 focus:ring-amber-500">
                            <option value="">เปลี่ยนสถานะ</option>
                            <option value="รอดำเนินการ">รอดำเนินการ</option>
                            <option value="รออะไหล่">รออะไหล่</option>
                            <option value="เสร็จสิ้น">เสร็จสิ้น</option>
                        </select>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // --- ฟังก์ชันที่คุณนิกกี้หาไม่เจอ คืออันนี้ครับ (ก๊อปปี้ไปได้เลย) ---
    function updateStatus(timestamp, newStatus) {
        if (!newStatus) return;
        
        if (!confirm('คุณต้องการเปลี่ยนสถานะเป็น "' + newStatus + '" ใช่หรือไม่?')) {
            location.reload(); 
            return;
        }

        // แสดง Loading บนปุ่มหรือหน้าจอ (Optional)
        document.body.style.cursor = 'wait';

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // เพื่อให้ส่งข้อมูลข้าม Domain ได้ (GitHub -> Google)
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action: 'updateStatus',
                timestamp: timestamp,
                newStatus: newStatus
            })
        }).then(() => {
            document.body.style.cursor = 'default';
            alert('อัปเดตสถานะเป็น ' + newStatus + ' สำเร็จ!');
            // รอสักครู่เพื่อให้ Google Sheets อัปเดตข้อมูล แล้วค่อยรีโหลดหน้า
            setTimeout(() => {
                location.reload();
            }, 1000);
        }).catch(err => {
            document.body.style.cursor = 'default';
            console.error("Update Error:", err);
            alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
        });
    }

    window.onload = loadLogs;
</script>
</body>
</html>
